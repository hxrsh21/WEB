<!DOCTYPE html>
<html>
<head>
  <title>Shop Assistant</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f2f5;
    }

    /* 🔹 Welcome Screen */
    .welcome {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
      text-align: center;
    }

    .handshake {
      font-size: 60px;
      animation: shake 1.2s infinite alternate;
    }

    @keyframes shake {
      from { transform: rotate(-10deg); }
      to { transform: rotate(10deg); }
    }

    .tagline {
      margin-top: 20px;
      font-size: 20px;
      opacity: 0;
      animation: fadeIn 2s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .enter-btn {
      margin-top: 30px;
      padding: 12px 20px;
      background: white;
      color: #007bff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    /* 🔹 Chat UI */
    .chat-container {
      display: none;
      width: 350px;
      height: 500px;
      background: white;
      border-radius: 10px;
      margin: 40px auto;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .chat-box {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .message {
      padding: 8px 12px;
      margin: 5px;
      border-radius: 10px;
      max-width: 70%;
      animation: pop 0.3s ease;
    }

    .user {
      background: #dcf8c6;
      align-self: flex-end;
    }

    .bot {
      background: #eee;
      align-self: flex-start;
    }

    @keyframes pop {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .input-area {
      display: flex;
      border-top: 1px solid #ccc;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      background: #0084ff;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- 🔹 Welcome Screen -->
<div class="welcome" id="welcome">
  <div class="handshake">🤝</div>
  <h1>Welcome to Our Shop</h1>
  <div class="tagline">✨ Best Deals • Instant Support • Smart Shopping ✨</div>
  <button class="enter-btn" onclick="enterChat()">Start Chat</button>
</div>

<!-- 🔹 Chat UI -->
<div class="chat-container" id="chatUI">
  <div class="chat-box" id="chat"></div>

  <div class="input-area">
    <input type="text" id="msg" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
function enterChat() {
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chatUI").style.display = "flex";
}

async function sendMessage() {
  let input = document.getElementById("msg");
  let message = input.value;

  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  // Typing effect
  addMessage("Typing...", "bot");

  let res = await fetch("http://localhost:5678/webhook/chatbot", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });

  let data = await res.json();

  setTimeout(() => {
    let chat = document.getElementById("chat");
    chat.lastChild.remove();
    addMessage(data.reply, "bot");
  }, 800);
}

function addMessage(text, type) {
  let chat = document.getElementById("chat");

  let msgDiv = document.createElement("div");
  msgDiv.classList.add("message", type);
  msgDiv.innerText = text;

  chat.appendChild(msgDiv);
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
