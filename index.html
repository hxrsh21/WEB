<!DOCTYPE html>
<html>
<head>
  <title>One-Sale-Point</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f2f5;
    }

    .welcome {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
      text-align: center;
    }

    .handshake {
      font-size: 60px;
      animation: shake 1.2s infinite alternate;
    }

    @keyframes shake {
      from { transform: rotate(-10deg); }
      to { transform: rotate(10deg); }
    }

    .enter-btn {
      margin-top: 30px;
      padding: 12px 20px;
      background: white;
      color: #007bff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .chat-container {
      display: none;
      width: 100%;
      height: 100vh;
      background: white;
      flex-direction: column;
    }

    .chat-header {
      background:#0084ff;
      color:white;
      padding:15px;
      text-align:center;
      font-weight:bold;
      font-size:18px;
    }

    .chat-box {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .message {
      padding: 10px 14px;
      margin: 5px;
      border-radius: 12px;
      max-width: 75%;
      animation: pop 0.3s ease;
      word-wrap: break-word;
    }

    .user {
      background: #dcf8c6;
      align-self: flex-end;
    }

    .bot {
      background: #eee;
      align-self: flex-start;
    }

    @keyframes pop {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .input-area {
      display: flex;
      border-top: 1px solid #ccc;
      padding: 5px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      padding: 12px;
      background: #0084ff;
      color: white;
      border: none;
      cursor: pointer;
    }

    @media (max-width: 600px) {
      .chat-header {
        font-size: 16px;
        padding: 12px;
      }
    }
  </style>
</head>

<body>

<div class="welcome" id="welcome">
  <div class="handshake">🤝</div>
  <h1>Welcome to One-Sale-Point</h1>
  <button class="enter-btn" onclick="enterChat()">Start Chat</button>
</div>

<div class="chat-container" id="chatUI">
  
  <div class="chat-header">
    🛍️ One-Sale-Point Assistant
  </div>

  <div class="chat-box" id="chat"></div>

  <div class="input-area">
    <input 
      type="text" 
      id="msg" 
      placeholder="Say hello 👋 or ask about products..."
    />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>

// Enter Chat
function enterChat() {
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chatUI").style.display = "flex";

  addMessage("Welcome to One-Sale-Point! 👋 How can I help you today?", "bot");
}

// 🔥 ENTER KEY SUPPORT (PC + Mobile)
document.getElementById("msg").addEventListener("keypress", function(event) {
  if (event.key === "Enter") {
    event.preventDefault();
    sendMessage();
  }
});

// Send Message
async function sendMessage() {
  let input = document.getElementById("msg");
  let message = input.value.trim();

  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  addMessage("Typing...", "bot");

  try {
    let res = await fetch("http://localhost:5678/webhook/chatbot", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    let data = await res.json();

    setTimeout(() => {
      let chat = document.getElementById("chat");
      chat.lastChild.remove();
      addMessage(data.reply, "bot");
    }, 600);

  } catch (e) {
    let chat = document.getElementById("chat");
    chat.lastChild.remove();
    addMessage("Server not reachable ❌", "bot");
  }
}

// Add message
function addMessage(text, type) {
  let chat = document.getElementById("chat");

  let msgDiv = document.createElement("div");
  msgDiv.classList.add("message", type);
  msgDiv.innerText = text;

  chat.appendChild(msgDiv);
  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
